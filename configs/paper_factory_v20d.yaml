version: V2.0D-paper-factory-v1
default_title: HPM-DT：面向高功率微波数字孪生 CAE 平台的可信度验证与论文自动生产线

citation_style: IEEE
latex:
  preferred_compilers:
    - xelatex
    - latexmk
    - pdflatex
  compile_timeout_s: 25
  require_compiler_for_preview: false
  require_bibliography: true

templates:
  min_templates: 3
  plugin_templates:
    enabled: true
    plugin_dirs:
      - plugins/builtin
    plugin_ids:
      - hpm.publication.paper_template_pack
  entries:
    - id: ieee_conference
      name: IEEE会议论文模板
      kind: ieee_conference
      filename: HPM_DT_V20D_IEEE会议论文模板.tex
      documentclass: "\\documentclass[conference]{IEEEtran}"
      audience: IEEE conference or workshop paper
      required_sections:
        - Introduction
        - Method
        - Results
        - Reproducibility
        - Limitations
        - Conclusion
    - id: journal_article
      name: 期刊论文模板
      kind: journal_article
      filename: HPM_DT_V20D_期刊论文模板.tex
      documentclass: "\\documentclass[UTF8]{ctexart}"
      audience: 中文期刊或扩展版技术论文
      required_sections:
        - 引言
        - 方法
        - 结果
        - 讨论
        - 可复现性
        - 结论
    - id: thesis_chapter
      name: 学位论文章节模板
      kind: thesis_chapter
      filename: HPM_DT_V20D_学位论文章节模板.tex
      documentclass: "\\documentclass[UTF8]{ctexrep}"
      audience: 学位论文方法与实验章节
      required_sections:
        - 平台架构
        - 验证方法
        - 实验结果
        - 统计审计
        - 本章小结

statistics:
  min_vv_cases: 6
  min_figures: 3
  min_tables: 3
  require_uncertainty: true
  require_sensitivity: true
  require_evidence_candidate: true

submission_readiness:
  min_ready_score: 80
  required_external_doi_count: 1
  required_formal_reproduction_id_count: 1
  require_evidence_candidate_gate: true
  require_pdf_archive: true
  required_pdf_filename: HPM_DT_V20D_论文定稿.pdf
  required_signed_template_count: 1
  weights:
    core_bundle: 15
    audit_chain: 15
    evidence_candidate_present: 10
    evidence_candidate_gate: 15
    external_doi: 15
    formal_reproduction_id: 15
    pdf_archive: 10
    target_template_signature: 5
    safety_boundary: 5

references:
  - key: hpm_dt_platform
    type: misc
    author: HPM-DT Team
    title: HPM-DT High-Power Microwave Digital Twin CAE Platform
    year: "2026"
    howpublished: Local reproducible software bundle
    note: Normalized research CAE platform; not a full-wave solver or damage predictor.
  - key: hpm_dt_vv_report
    type: misc
    author: HPM-DT Team
    title: V2.0A Verification and Validation Report
    year: "2026"
    howpublished: outputs_v20a_vv/v20A_可信度验证报告.html
    note: Machine-generated V&V evidence package.
  - key: hpm_dt_readiness
    type: misc
    author: HPM-DT Team
    title: Platform Readiness and Publication-Readiness Audit
    year: "2026"
    howpublished: outputs_v20a_vv/platform_readiness/platform_readiness_report.json
    note: Software and publication maturity audit.
  - key: hpm_dt_evidence_candidate
    type: misc
    author: HPM-DT Team
    title: External Evidence Package Verification and Validation Candidate Scoring Audit
    year: "2026"
    howpublished: outputs_v20a_vv/data_import_v30/evidence_package_vv_candidate.json
    note: Candidate-only audit for provenance, normalized residual, uncertainty coverage, and non-rewrite scoring policy.

reproduction_registry:
  - id: REP-PF-001
    type: platform_evidence
    topic: 可信度验证体系
    reference_key: hpm_dt_vv_report
    evidence: outputs_v20a_vv/v20A_验证结果.json
    status: automated
    blocker: 论文定稿前仍需绑定外部文献 DOI 或正式复现实验编号。
  - id: REP-PF-002
    type: platform_evidence
    topic: 平台成熟度与发文准备度
    reference_key: hpm_dt_readiness
    evidence: outputs_v20a_vv/platform_readiness/platform_readiness_report.json
    status: automated
    blocker: 真实外部数据源链和相位参考仍未进入正式评分。
  - id: REP-PF-003
    type: software_artifact
    topic: HPM-DT 平台软件包
    reference_key: hpm_dt_platform
    evidence: PROJECT_MANIFEST.json
    status: automated
    blocker: 软著/课题归档前需冻结版本号和发布包校验和。

safety_boundary:
  description: Paper Factory 只组织已经验证的归一化科研结果，不生成真实作用距离、器件阈值或真实毁伤概率。
  no_output_items:
    - 真实作用距离
    - 器件阈值
    - 真实毁伤概率
    - 作战效能结论
